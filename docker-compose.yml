services:

  # Banco de dados MySQL
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: todo_db
    ports:
      - "3307:3306"  # 3307 no host para não conflitar com seu MySQL local

  # Sua API
  api:
    build: ./todoapi
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/todo_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      JWT_SECRET: minha-chave-super-secreta-guilherme-todoapi-2024
    depends_on:
      - db